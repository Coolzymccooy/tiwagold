appId: host.exp.exponent
name: Tiwa Gold - Forgot password navigation
tags:
  - auth
---
- launchApp:
    appId: host.exp.exponent
    clearState: false
- runFlow: helpers/open-tiwa-gold.yaml
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- tapOn: "Forgot password?"
- assertVisible: "Reset your password"
- assertVisible: "Send reset link"
- tapOn: "Back to sign in"
- assertVisible: "Welcome back"
