appId: host.exp.exponent
name: Tiwa Gold - Signup navigation
tags:
  - auth
---
- launchApp:
    appId: host.exp.exponent
    clearState: false
- runFlow: helpers/open-tiwa-gold.yaml
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- tapOn: "New here? Create an account"
- assertVisible: "Create your account"
- assertVisible: "FULL NAME"
- assertVisible: "EMAIL"
- assertVisible: "PASSWORD"
- tapOn: "Already have an account? Sign in"
- assertVisible: "Welcome back"
